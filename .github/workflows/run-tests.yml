name: Integration Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Backend dependencies
        run: npm install --prefix functions

      - name: Run backend unit tests
        run: npm run test:backend --prefix functions

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Clean up orphaned ports
        run: |
          kill $(lsof -t -i :3000) 2>/dev/null || true
          kill $(lsof -t -i :8080) 2>/dev/null || true
          kill $(lsof -t -i :9099) 2>/dev/null || true
          kill $(lsof -t -i :5001) 2>/dev/null || true
          kill $(lsof -t -i :9199) 2>/dev/null || true
          kill $(lsof -t -i :4000) 2>/dev/null || true

      - name: Run tests
        run: npx playwright test --config playwright.config.ts
        timeout-minutes: 10

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30
